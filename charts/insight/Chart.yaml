##
## Insight — umbrella chart.
##
## Canonical unit of distribution for the platform.
## Emits almost nothing on its own — it orchestrates subcharts.
##
## What is INCLUDED here:
##   - Edge / auth: gateway (nginx+auth), authenticator, fakeidp (dev only)
##   - Application: analytics, identity, frontend
##
## What is NOT included (deployed separately):
##   - L2 infra (ClickHouse, MariaDB, Redis, Redpanda) — deployed as
##     separate releases in `insight-infra` via gitops `make system-*`.
##     The umbrella only dials them through `<dep>.host` wiring.
##   - Airbyte        — see scripts/install-airbyte.sh
##   - Argo Workflows — see scripts/install-argo.sh
##
## Release name convention: `insight`. Changing the name requires
## overriding the hardcoded DNS references in values (see values.yaml).
##
apiVersion: v2
name: insight
description: Insight — observability & analytics platform (umbrella chart)
type: application
# version    — packaging version of the chart. Bump on EVERY chart change.
# appVersion — product version. Matches the image tag of all insight-* images.
# Release pipeline: git tag v0.1.0 → version=0.1.0, appVersion="0.1.0".
version: 0.4.11
appVersion: "2026.07.23.03.13-c549f39"
kubeVersion: ">=1.27.0-0"
home: https://github.com/constructorfabric/insight
sources:
  - https://github.com/constructorfabric/insight
maintainers:
  - name: Constructorfabric
    url: https://github.com/constructorfabric
# Dependencies — the heart of the umbrella.
#
# This chart bundles ONLY the first-party application services. The L2
# infrastructure (ClickHouse, MariaDB, Redis, Redpanda) is deployed
# separately in `insight-infra` via gitops `make system-*`; the umbrella
# dials those out-of-chart hosts through `<dep>.host` wiring in values.yaml.
#
# Fields:
#   name        — dependency chart name (must match the dependency's Chart.yaml name)
#   version     — strict pin for first-party charts
#   repository  — file:// for local app-service charts
#   condition   — toggle in values (path to a boolean field)
#   alias       — short key name in values.yaml (otherwise the full chart name is needed)
#
# When adding a new dependency, remember to:
#   1. helm dependency update charts/insight
#   2. add a matching block in values.yaml under the same key (or alias)
#
dependencies:
  # ─── Application services ──────────────────────────────────────────────
  # All aliases are camelCase so values.yaml stays clean.
  # Service names inside the cluster stay kebab-case: `insight-gateway`.
  #
  # No `condition:` on app services: the umbrella is a single deployable
  # unit and every app service is mandatory (Constructor Platform /
  # SRE requirement). The gateway is the only entrance; the rest of the
  # services are reachable only through it.
  # nginx+auth edge (NGINX_BFF, EPIC #1583). The `gateway` (OpenResty) is the
  # single entrance: auth_request -> authenticator, gateway-JWT injection, and
  # fan-out to the app services + SPA. The `authenticator` runs OIDC login +
  # Redis sessions + the cookie->ES256 gateway-JWT exchange (with an authn-tls
  # sidecar so downstream verifiers resolve the JWKS over https). `fakeidp` is
  # the dev/e2e OIDC provider (local only; never a real environment).
  - name: insight-gateway
    alias: gateway
    version: "0.1.0"
    repository: "file://../../src/backend/services/gateway/helm"
  - name: insight-authenticator
    alias: authenticator
    version: "0.1.0"
    repository: "file://../../src/backend/services/authenticator/helm"
  - name: insight-fakeidp
    alias: fakeidp
    version: "0.1.0"
    repository: "file://../../src/backend/services/fakeidp/helm"
    condition: fakeidp.deploy
  # keycloak — the real-OIDC dev/e2e IdP (heavier counterpart to fakeidp; local
  # k8s uses it, CI/compose default to fakeidp). LOCAL/CI only; off by default.
  - name: insight-keycloak
    alias: keycloak
    version: "0.1.0"
    repository: "file://../../src/backend/services/keycloak/helm"
    condition: keycloak.deploy
  - name: insight-analytics
    alias: analytics
    version: "0.2.0"
    repository: "file://../../src/backend/services/analytics/helm"
  # Identity — .NET 9 service that reads from the MariaDB `persons` table
  # (per identity ADR-0002). Gated because it needs `persons` populated
  # by the seed pipeline.
  - name: insight-identity
    alias: identity
    version: "0.1.0"
    repository: "file://../../src/backend/services/identity/helm"
    condition: identity.deploy
  # Frontend SPA. Conditional: the gateway serves it at "/", but the backend
  # (/api/*) is fully usable without it (the gateway's front upstream resolves
  # lazily), so a backend-only bring-up can run frontend.deploy=false.
  - name: insight-frontend
    alias: frontend
    version: "0.1.0"
    repository: "file://../../src/frontend/helm"
    condition: frontend.deploy
