credentials:
  deploymentMode: gitops
  autoGenerate: false

global:
  storageClass: local-path
  tenantDefaultId: "00000000-df51-5b42-9538-d2b56b7ee953"

clickhouse:
  host: clickhouse.insight-infra.svc.cluster.local
  port: 8123
  database: insight
  username: insight

mariadb:
  host: mariadb.insight-infra.svc.cluster.local
  port: 3306
  database: insight
  username: insight

redis:
  host: redis-master.insight-infra.svc.cluster.local
  port: 6379

redpanda:
  brokers: "redpanda-disabled:9093"

ingestion:
  templates:
    enabled: false
  dataQuality:
    enabled: false

gateway:
  replicaCount: 1
  ingress:
    enabled: true

authenticator:
  replicaCount: 1
  tlsDiscovery:
    enabled: true
    issuerRef:
      name: local-ca
      kind: ClusterIssuer
  oidc:
    issuerUrl: 'http://{{ .Release.Name }}-fakeidp.{{ .Release.Namespace }}.svc.cluster.local:8084'
    clientId: "insight-authenticator"
    redirectUri: "http://localhost/auth/callback"

fakeidp:
  deploy: true
  issuer: 'http://{{ .Release.Name }}-fakeidp.{{ .Release.Namespace }}.svc.cluster.local:8084'
  devUserEmail: "dev@company.nonpresent"

analytics:
  replicaCount: 1

identity:
  deploy: true
