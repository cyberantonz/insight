# Gateway route table for the docker-compose dev stack. Same schema as the
# chart's gateway.routes values, but with compose service names (docker DNS
# resolves them) instead of Helm-templated k8s names -- compose has no Helm to
# render {{ .Release.Name }}. The gateway container compiles this into nginx.conf
# at startup.
version: 1
defaults:
  strip_request_headers:
    - X-Real-IP
    - Forwarded
routes:
  # strip_prefix turns `/api/analytics/v1/metrics` into the service's own
  # `/v1/metrics` (analytics + identity are addressed directly, serving `/v1/*`).
  - prefix: /api/analytics
    upstream: http://analytics:8081
    strip_prefix: true
    timeout_ms: 60000
  - prefix: /api/identity
    upstream: http://identity:8082
    strip_prefix: true
