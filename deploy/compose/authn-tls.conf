# TLS discovery front for the authenticator (dev-compose full-auth).
#
# The analytics oidc-authn-plugin resolves the authenticator's JWKS via OIDC
# discovery and its runtime is https-only. This nginx terminates TLS with a
# self-signed cert (CN/SAN authn-tls, trusted by analytics via /certs/ca.pem)
# and proxies the well-known endpoints to the authenticator's plain-http
# listener. `iss` = https://authn-tls:8443, so the discovery doc + JWKS are
# served from this origin. Certs are generated by dev-compose.sh into
# deploy/compose/authn-tls-certs/.
# Docker's embedded DNS (127.0.0.11) + a variable proxy_pass so the
# authenticator upstream is resolved per-request, not at config load — the front
# survives an authenticator restart (stale-IP-proof) without needing a restart.
resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 8443 ssl;
    server_name authn-tls;

    ssl_certificate     /certs/server.pem;
    ssl_certificate_key /certs/server.key;

    location /.well-known/ {
        set $authn_upstream http://authenticator:8083;
        proxy_pass $authn_upstream;
        proxy_set_header Host $host;
    }

    location = /healthz {
        return 200 "ok\n";
    }
}
