# TLS discovery front for the authenticator (downstream-verify e2e only).
#
# The upstream `cf-gears-oidc-authn-plugin` verifies the gateway JWT by
# resolving the authenticator's JWKS via OIDC discovery, and its runtime URL
# policy is https-only (no http discovery/JWKS in a real, non-test build). This
# tiny nginx terminates TLS with a self-signed cert (CN/SAN = authn-tls, trusted
# by analytics via /certs/ca.pem) and proxies the well-known endpoints to the
# authenticator's plain-http listener. `iss` = https://authn-tls:8443, so the
# discovery doc + JWKS are served from this origin.
server {
    listen 8443 ssl;
    server_name authn-tls;

    ssl_certificate     /certs/server.pem;
    ssl_certificate_key /certs/server.key;

    # Only the discovery surface needs to be reachable over TLS.
    location /.well-known/ {
        proxy_pass http://authenticator:8083;
        proxy_set_header Host $host;
    }

    location = /healthz {
        return 200 "ok\n";
    }
}
