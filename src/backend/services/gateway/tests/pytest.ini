[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# downstream-verify/ is a self-contained e2e suite with its own conftest.py +
# compose; it runs standalone (downstream-verify/run-e2e.sh). Don't recurse into
# it from the step-05 suite here — two bare `conftest` modules on sys.path would
# collide on import.
norecursedirs = downstream-verify
addopts =
    -ra
    --tb=short
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-7s | %(message)s
log_cli_date_format = %H:%M:%S
