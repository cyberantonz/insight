apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insight-gateway.fullname" . }}
  labels:
    {{- include "insight-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "insight-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "insight-gateway.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pods when the route table changes; the container regenerates
        # nginx.conf from it on start (DESIGN 3.13). A broken table never ships
        # -- the entrypoint runs `nginx -t` and fails the pod before serving.
        checksum/routes: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global }}
      {{- with .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      # No Docker-link env-vars; the gateway reaches everything by DNS.
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: gateway
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Deployment settings -> routegen flags at startup (entrypoint). The
          # route table itself is the mounted ConfigMap; nothing is baked.
          env:
            - name: GATEWAY_ROUTES_FILE
              value: /etc/gateway/routes.yaml
            - name: GATEWAY_AUTHENTICATOR_URL
              value: {{ tpl .Values.gateway.authenticatorUrl . | quote }}
            - name: GATEWAY_FRONT_URL
              value: {{ tpl .Values.gateway.frontUrl . | quote }}
            {{- with .Values.gateway.setRealIpFrom }}
            - name: GATEWAY_SET_REAL_IP_FROM
              value: {{ join "," . | quote }}
            {{- end }}
            {{- with .Values.gateway.jwtCacheSize }}
            - name: GATEWAY_JWT_CACHE_SIZE
              value: {{ . | quote }}
            {{- end }}
          volumeMounts:
            - name: routes
              mountPath: /etc/gateway
              readOnly: true
            # Writable tmp: routegen writes nginx.conf here and nginx keeps its
            # pid + temp paths here (the config points them at /tmp). Everything
            # else is stateless (DESIGN 3.7).
            - name: tmp
              mountPath: /tmp
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: routes
          configMap:
            name: {{ include "insight-gateway.fullname" . }}-routes
        - name: tmp
          emptyDir: {}
