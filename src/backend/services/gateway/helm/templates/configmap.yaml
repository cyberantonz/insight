{{- /*
  The reviewable route table, built from .Values.gateway.routes and rendered
  with `tpl` so `{{ .Release.Name }}` in each upstream resolves to the real
  service. The gateway container compiles this into nginx.conf at startup via
  routegen; editing routes is a values change, reviewable in gitops (DD-GW-02).
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "insight-gateway.fullname" . }}-routes
  labels:
    {{- include "insight-gateway.labels" . | nindent 4 }}
data:
  routes.yaml: |
    version: 1
    defaults:
      strip_request_headers:
        {{- range .Values.gateway.defaults.stripRequestHeaders }}
        - {{ . }}
        {{- end }}
    routes:
      {{- range .Values.gateway.routes }}
      - prefix: {{ .prefix }}
        upstream: {{ tpl .upstream $ | quote }}
        {{- with .timeoutMs }}
        timeout_ms: {{ . }}
        {{- end }}
        {{- with .stripPrefix }}
        strip_prefix: {{ . }}
        {{- end }}
        {{- with .websocket }}
        websocket: {{ . }}
        {{- end }}
      {{- end }}
