# Insight Identity Resolution — gears-rust host config.
#
# Usage: identity-resolution --config config/insight.yaml
#
# Auth is ENABLED on the api-gateway host (NGINX_BFF R1): the upstream
# `cf-gears-oidc-authn-plugin` verifies the ES256 gateway JWT against the
# authenticator's JWKS (resolved via OIDC discovery on the issuer) and maps its
# claims into the SecurityContext (sub -> subject_id, tenant_id ->
# subject_tenant_id, sub_type -> subject_type, roles -> token_scopes). Same
# authenticated system-gear set as the analytics host. A request without a valid
# gateway JWT carrying a `tenant_id` gets 401 — no auth_disabled path.
#
# The plugin's verification config (jwt.trusted_issuers, expected_audience,
# http_client.custom_ca_certificate_paths) is nested/list-shaped and supplied by
# the deployment's config layer (compose bind-mount / Helm), not APP__ env.

server:
  home_dir: "~/.insight"

logging:
  default:
    console_level: info

gears:
  api-gateway:
    config:
      bind_addr: "0.0.0.0:8083"
      enable_docs: true
      cors_enabled: true
      openapi:
        title: "Insight Identity Resolution API"
        version: "0.1.0"
        description: "Identity Resolution read API (Rust port)"
      # Auth ENABLED: the oidc-authn-plugin verifies the ES256 gateway JWT and
      # maps its claims into the SecurityContext (R1). No auth_disabled path.
      auth_disabled: false

  gear-orchestrator:
    config: {}

  grpc-hub:
    config:
      listen_addr: "uds:///tmp/identity-resolution-grpc"

  authn-resolver:
    config:
      vendor: "hyperspot"

  # Downstream gateway-JWT verification (NGINX_BFF R1). Verifies the ES256
  # gateway JWT against the authenticator's JWKS (resolved via OIDC discovery on
  # the issuer) and maps its claims into the SecurityContext. The deployment
  # supplies the real issuer + self-signed CA (dev/e2e) via the config layer;
  # the placeholders below (`.invalid`, never resolvable) fail closed.
  oidc-authn-plugin:
    config:
      vendor: "hyperspot"
      priority: 50
      jwt:
        supported_algorithms: ["ES256"]
        clock_skew_leeway: 60s
        require_audience: true
        expected_audience:
          - "internal-services"
        trusted_issuers:
          - issuer: "https://gateway.invalid"
        claim_mapping:
          subject_id: "sub"
          subject_tenant_id: "tenant_id"
          subject_type: "sub_type"
          token_scopes: "roles"
        required_claims: []
      http_client:
        request_timeout: 5s
        # Dev/e2e self-signed CA injected per deploy:
        #   custom_ca_certificate_paths: ["/certs/ca.pem"]
      # Client-credentials exchange is unused here but required config;
      # discovery_url must name a trusted issuer, never fetched.
      s2s_oauth:
        discovery_url: "https://gateway.invalid"
        default_subject_type: "service"
        token_cache:
          ttl: 300s
          max_entries: 100

  authz-resolver:
    config:
      vendor: "hyperspot"

  static-authz-plugin:
    config:
      vendor: "hyperspot"
      priority: 100

  tenant-resolver:
    config:
      vendor: "hyperspot"

  single-tenant-tr-plugin:
    config:
      vendor: "hyperspot"
      priority: 20

  identity-resolution:
    config:
      # MariaDB connection URL. Injected per-deployment via env override
      # APP__gears__identity-resolution__config__database_url. Left empty
      # here so no credential is committed.
      database_url: ""
      # Source instance whose org_chart edges drive the parent/supervisor +
      # subordinates tree on the lookup endpoints (mirrors .NET AppOptions).
      org_chart_source_type: "bamboohr"
      # Kill switch for the recursive subordinates walk. Set to false to skip
      # the (potentially large, N+1) subtree expansion on POST /v1/profiles.
      expand_subordinates: true
      # Hard cap on org-tree recursion depth (cycle-safe).
      max_depth: 16
