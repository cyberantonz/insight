apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "insight-analytics.fullname" . }}-gears-config
  labels:
    {{- include "insight-analytics.labels" . | nindent 4 }}
data:
  # gears-rust host config. Structural only — the deployment-specific leaf
  # values (database_url / clickhouse_* / redis_url / identity_url /
  # tenant_default_id) are injected as APP__* env vars from the
  # `insight-analytics-config` Secret (see deployment.yaml `envFrom`),
  # which override this YAML at load time.
  #
  # Auth ENABLED: the upstream `cf-gears-oidc-authn-plugin` verifies the ES256
  # gateway JWT (signature / iss / aud / exp) against the authenticator's JWKS —
  # resolved via OIDC discovery on the issuer — and maps its claims straight into
  # the SecurityContext (NGINX_BFF R1). The issuer / discovery / audience are
  # rendered below from `.Values.gateway.*`; there is no `authverify` wrapper and
  # no `X-Tenant-ID` selector. No auth_disabled path.
  analytics.yaml: |
    server:
      home_dir: "/app/data"

    logging:
      default:
        console_level: info

    gears:
      api-gateway:
        config:
          bind_addr: "0.0.0.0:{{ .Values.service.port }}"
          # analytics is addressed directly (the platform gateway proxies
          # `/analytics` → here), so no prefix_path.
          # Auth ENABLED: the oidc-authn-plugin verifies the ES256 gateway JWT
          # and maps its claims into the SecurityContext (R1).
          auth_disabled: false
          cors_enabled: false
          enable_docs: false
          openapi:
            title: "Insight Analytics API"
            version: "0.1.0"
            description: "Read-only query service over predefined ClickHouse metrics"

      gear-orchestrator:
        config: {}

      grpc-hub:
        config:
          listen_addr: "uds:///tmp/analytics-grpc"

      authn-resolver:
        config:
          vendor: "hyperspot"

      # Downstream gateway-JWT verification (NGINX_BFF R1). Verifies the ES256
      # gateway JWT against the authenticator's JWKS (resolved via OIDC discovery
      # on the issuer) and maps its claims into the SecurityContext. Rendered
      # from `.Values.gateway.*`; the plugin resolves the JWKS over https only.
      oidc-authn-plugin:
        config:
          vendor: "hyperspot"
          priority: 50
          jwt:
            supported_algorithms: ["ES256"]
            clock_skew_leeway: 60s
            require_audience: true
            expected_audience:
              - {{ .Values.gateway.audience | default "internal-services" | quote }}
            # `issuer` = the token `iss` (authenticator gateway_issuer);
            # `discovery_url` defaults to `{issuer}` when unset.
            trusted_issuers:
              - issuer: {{ tpl (.Values.gateway.issuer | default "") . | quote }}
                {{- with .Values.gateway.discoveryUrl }}
                discovery_url: {{ tpl . $ | quote }}
                {{- end }}
            # tenant_id is REQUIRED (mapped to subject_tenant_id) — a token
            # without it is rejected ("no tenant, no auth").
            claim_mapping:
              subject_id: "sub"
              subject_tenant_id: "tenant_id"
              subject_type: "sub_type"
              token_scopes: "roles"
            required_claims: []
          http_client:
            request_timeout: 5s
            {{- with .Values.gateway.caCertPaths }}
            # Extra trust roots for the discovery/JWKS TLS (e.g. an internal CA).
            custom_ca_certificate_paths:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          # Client-credentials exchange is unused by analytics but required
          # config; discovery_url must name a trusted issuer, never fetched.
          s2s_oauth:
            discovery_url: {{ tpl (.Values.gateway.issuer | default "") . | quote }}
            default_subject_type: "service"
            token_cache:
              ttl: 300s
              max_entries: 100

      authz-resolver:
        config:
          vendor: "hyperspot"

      static-authz-plugin:
        config:
          vendor: "hyperspot"
          priority: 100

      tenant-resolver:
        config:
          vendor: "hyperspot"

      # Derives the tenant from the SecurityContext at request time; the
      # oidc-authn-plugin sets it from the gateway JWT's single `tenant_id`.
      single-tenant-tr-plugin:
        config:
          vendor: "hyperspot"
          priority: 20

      # Leaf values (database_url, clickhouse_*, redis_url, identity_url,
      # metric_catalog.tenant_default_id) come from the Secret via envFrom.
      analytics:
        config: {}
