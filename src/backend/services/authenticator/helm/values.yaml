replicaCount: 1

podAnnotations: {}

image:
  repository: ghcr.io/constructorfabric/insight-authenticator
  tag: "" # MUST be set by the operator. No `:latest` default.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8083
  # Service-token listener (§10 G4 second listener): POST /internal/token only.
  # Exposed as a second port on the same Service; network-scoped separately
  # from the main port (see networkPolicy.tokenPort below).
  tokenPort: 8093

# Service tokens (§10 G1 / DD-AUTH-05). The registry holds only PUBLIC keys, so
# it is gitops-reviewable config: onboarding a service is a PR adding its key.
# `audience` is the token endpoint URL callers sign assertions for — typically
# `http://<release>-authenticator.<ns>.svc:<tokenPort>/internal/token`.
# `services` is empty by default; real entries land here via gitops. The dev
# `testclient` lives only in the compose config, never in this chart.
serviceTokens:
  audience: ""
  assertionMaxLifetimeSeconds: 60
  tokenTtlSeconds: 300
  # Directory that relative `public_key_paths` resolve against (leave empty to
  # use absolute paths or inline `public_keys`).
  publicKeyDir: ""
  # name -> { public_keys: [<inline PEM>...] | public_key_paths: [<file>...], roles: [...] }
  # Service tokens are always tenant-scoped; there is no per-service tenant flag.
  services: {}

# CSRF Origin-allowlist fallback (PRD 5.11) for state-changing /auth/*
# requests that carry no X-CSRF-Token: list the SPA's public origin(s), e.g.
# ["https://insight.example.com"]. Empty (default) = fail closed, header only.
#
# DEPLOY COORDINATION: CSRF is enforced fail-closed. An SPA that does not yet
# send X-CSRF-Token will get 403 on POST /auth/logout, /auth/refresh, and
# DELETE /auth/sessions once this chart is rolled. Either roll the matching
# insight-front (which sends the header) FIRST, or set csrfOrigins to the SPA's
# public origin here so the Origin fallback keeps those calls working during
# the transition.
csrfOrigins: []

# Audit publishing (PRD nfr-auth-audit): auth events to the platform Redpanda
# topic. Empty brokers (default) disables publishing — events stay in the
# structured log. The umbrella wires the bundled Redpanda.
audit:
  brokers: ""
  topic: "insight.audit.events"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Pre-provisioned Secret carrying the gears-rust host's leaf-config overrides
# (injected via envFrom; they override the mounted config ConfigMap):
#   APP__gears__authenticator__config__redis_url
#   APP__gears__authenticator__config__identity_url
#   APP__gears__authenticator__config__gateway_issuer
#   APP__gears__authenticator__config__redirect_uri
#   APP__gears__authenticator__config__idp__issuer_url
#   APP__gears__authenticator__config__idp__client_id
#   APP__gears__authenticator__config__idp__client_secret
#
# The umbrella populates `insight-authenticator-config` automatically; for
# standalone installs the operator pre-creates an equivalent Secret and sets
# `existingSecret` to its name.
existingSecret: ""

# Secret holding the ES256 signing keys, mounted at `signingKeysPath`. Keys:
#   current.pem   (PKCS#8 EC P-256 private key, required)
#   previous.pem  (optional, during a rotation overlap)
# Rotate by shipping a new `current.pem` (+ keeping `previous.pem` for at least
# jwt_ttl + downstream JWKS cache age, ~65 min) and rolling the pods.
signingKeysSecret: ""
signingKeysPath: /app/keys

# TLS discovery front (NGINX_BFF R1). Downstream verifiers (analytics /
# identity-resolution) run the oidc-authn-plugin, which resolves the JWKS via
# OIDC discovery over HTTPS ONLY. When enabled, an `authn-tls` nginx sidecar
# terminates TLS on `port` (cert issued by cert-manager from `issuerRef`) and
# proxies the well-known endpoints to the authenticator on localhost. The token
# `iss` (gateway_issuer) is then `https://<fullname>:<port>`, and downstream
# services trust the issuer's CA (the cert Secret's ca.crt) via
# gateway.caCertPaths. Disabled by default; the umbrella turns it on.
tlsDiscovery:
  enabled: false
  port: 8443
  # cert-manager issuer that signs the discovery cert (local: the self-signed
  # `local-ca` ClusterIssuer; prod: a real issuer).
  issuerRef:
    name: ""
    kind: ClusterIssuer
  # Secret cert-manager writes the leaf + ca.crt into. Empty = <fullname>-authn-tls-cert.
  certSecret: ""
  # Unprivileged nginx (runs non-root, binds the high :8443, writable /tmp paths)
  # — the pod's securityContext forbids root.
  image:
    repository: nginxinc/nginx-unprivileged
    tag: "1.27-alpine"

# Health probes. Boot fails closed if Redis is unreachable or the signing keys
# are missing (the gear pings Redis and loads keys in `init`), so a Ready pod
# has both. (A dedicated /ready that re-checks Redis at runtime is a follow-up.)
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

# G4 layer 2 (NGINX_BFF.md §10 G4): restrict the authenticator main port
# (sessions, JWKS, /internal/authz) to the gateway pods only. Cross-chart
# dependency -- `gatewayPodSelector` must match the insight-gateway chart's pod
# labels (it sets app.kubernetes.io/name: gateway). Disabled by default: enable
# in clusters with a NetworkPolicy-enforcing CNI, once the gateway is deployed.
# This is defense-in-depth; /internal/authz still requires a live session cookie
# regardless of network position (layer 3).
networkPolicy:
  enabled: false
  gatewayPodSelector:
    app.kubernetes.io/name: gateway
  # Optional: also require the gateway to live in a labelled namespace. Empty =
  # same-namespace pods only (the default NetworkPolicy scope).
  gatewayNamespaceSelector: {}

  # Access to the token port is disabled by default; enable it in your gitops
  # config. It restricts /internal/token to the app-namespace service pods that
  # need service tokens. Defense-in-depth only: the endpoint still demands a
  # valid RFC 7523 assertion regardless of network position.
  tokenPort:
    enabled: false
    # Which pods may reach the token port. Empty {} = every pod in the namespace.
    clientPodSelector: {}
    # Optional namespace selector for cross-namespace callers.
    clientNamespaceSelector: {}
