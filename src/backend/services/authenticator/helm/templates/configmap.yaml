apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "insight-authenticator.fullname" . }}-gears-config
  labels:
    {{- include "insight-authenticator.labels" . | nindent 4 }}
data:
  # gears-rust host config. Structural only — deployment-specific leaf values
  # (redis_url / identity_url / gateway_issuer / redirect_uri / idp.*) are
  # injected as APP__* env vars from the `insight-authenticator-config` Secret
  # (see deployment.yaml `envFrom`), which override this YAML at load time.
  #
  # The `api-gateway` gear below is the gears-rust toolkit REST-host system gear
  # (`cf-gears-api-gateway`) — the HTTP server every gear-based service runs on,
  # NOT the Insight platform gateway that nginx replaces. The authenticator
  # hosts on it, behind the nginx edge.
  #
  # Browser endpoints are `.public()` (the credential is the session cookie,
  # checked in the handler); the `.authenticated()` admin surface (session
  # revoke-by-user) is verified by the oidc-authn-plugin against the
  # authenticator's OWN issuer — through the TLS discovery front when enabled
  # (the plugin resolves discovery over HTTPS only), else against a
  # fail-closed `.invalid` placeholder. The signing keys come from the mounted
  # Secret at `signingKeysPath`.
  authenticator.yaml: |
    server:
      home_dir: "/app/data"

    logging:
      default:
        console_level: info

    gears:
      api-gateway:
        config:
          bind_addr: "0.0.0.0:{{ .Values.service.port }}"
          auth_disabled: false
          cors_enabled: false
          enable_docs: false
          openapi:
            title: "Insight Authenticator"
            version: "0.1.0"
            description: "OIDC login, opaque sessions, and the cookie-to-JWT exchange"

      gear-orchestrator:
        config: {}

      grpc-hub:
        config:
          listen_addr: "uds:///tmp/authenticator-grpc"

      authn-resolver:
        config:
          vendor: "hyperspot"

      # Gateway-JWT verification for the `.authenticated()` admin surface. The
      # issuer is the authenticator's own gateway_issuer; with the TLS
      # discovery front on, discovery resolves in-pod over HTTPS with the
      # front's CA. Without it there is no HTTPS discovery source, so a
      # fail-closed placeholder keeps the admin surface dark (public endpoints
      # are unaffected).
      oidc-authn-plugin:
        config:
          vendor: "hyperspot"
          priority: 50
          jwt:
            supported_algorithms: ["ES256"]
            clock_skew_leeway: 60s
            require_audience: true
            expected_audience:
              - "internal-services"
            trusted_issuers:
{{- if .Values.tlsDiscovery.enabled }}
              - issuer: "https://{{ include "insight-authenticator.fullname" . }}:{{ .Values.tlsDiscovery.port }}"
{{- else }}
              - issuer: "https://gateway.invalid"
{{- end }}
            claim_mapping:
              subject_id: "sub"
              subject_tenant_id: "tenant_id"
              subject_type: "sub_type"
              token_scopes: "roles"
            required_claims: []
          http_client:
            request_timeout: 5s
{{- if .Values.tlsDiscovery.enabled }}
            custom_ca_certificate_paths: ["/app/authn-ca/ca.crt"]
{{- end }}
          # Client-credentials exchange is UNUSED here but the block is
          # required config; never fetched unless an exchange is performed.
          s2s_oauth:
{{- if .Values.tlsDiscovery.enabled }}
            discovery_url: "https://{{ include "insight-authenticator.fullname" . }}:{{ .Values.tlsDiscovery.port }}"
{{- else }}
            discovery_url: "https://gateway.invalid"
{{- end }}
            default_subject_type: "service"
            token_cache:
              ttl: 300s
              max_entries: 100

      authz-resolver:
        config:
          vendor: "hyperspot"

      static-authz-plugin:
        config:
          vendor: "hyperspot"
          priority: 100

      tenant-resolver:
        config:
          vendor: "hyperspot"

      single-tenant-tr-plugin:
        config:
          vendor: "hyperspot"
          priority: 20

      # Leaf values (redis_url, identity_url, gateway_issuer, redirect_uri,
      # idp.*) come from the Secret via envFrom. The signing-keys path is
      # structural and points at the mounted Secret volume.
      authenticator:
        config:
          signing_keys_path: {{ .Values.signingKeysPath | quote }}
          # Audit events to the platform Redpanda topic (PRD nfr-auth-audit).
          audit:
            brokers: {{ .Values.audit.brokers | quote }}
            topic: {{ .Values.audit.topic | quote }}
          # CSRF Origin-allowlist fallback for state-changing /auth/* requests;
          # empty = fail closed (X-CSRF-Token required).
          {{- with .Values.csrfOrigins }}
          csrf_origins:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Service tokens (§10 G1). The registry is gitops-reviewable config
          # (public keys are not secrets) rendered from .Values.serviceTokens.
          service_tokens:
            token_bind_addr: "0.0.0.0:{{ .Values.service.tokenPort }}"
            assertion_max_lifetime_seconds: {{ .Values.serviceTokens.assertionMaxLifetimeSeconds }}
            token_ttl_seconds: {{ .Values.serviceTokens.tokenTtlSeconds }}
            {{- with .Values.serviceTokens.audience }}
            audience: {{ . | quote }}
            {{- end }}
            {{- with .Values.serviceTokens.publicKeyDir }}
            public_key_dir: {{ . | quote }}
            {{- end }}
            {{- with .Values.serviceTokens.services }}
            services:
              {{- toYaml . | nindent 14 }}
            {{- end }}
