apiVersion: v1
kind: Service
metadata:
  name: {{ include "insight-authenticator.fullname" . }}
  labels:
    {{- include "insight-authenticator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    # Service-token listener (§10 G4). Second port on the same Service; scoped
    # separately by NetworkPolicy (token-port ingress from app service pods).
    - port: {{ .Values.service.tokenPort }}
      targetPort: token
      protocol: TCP
      name: token
  selector:
    {{- include "insight-authenticator.selectorLabels" . | nindent 4 }}
