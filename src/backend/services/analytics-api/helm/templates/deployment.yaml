apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insight-analytics-api.fullname" . }}
  labels:
    {{- include "insight-analytics-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "insight-analytics-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "insight-analytics-api.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when the gears config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global }}
      {{- with .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      # Suppress the legacy `<SVC>_SERVICE_HOST/PORT/…` Docker-link env-vars
      # kubelet auto-injects for every Service in the namespace at pod-start
      # (see api-gateway deployment for the longer explanation).
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: analytics-api
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # gears-rust host: structural config from the mounted ConfigMap;
          # leaf values (DB/tenant) from the Secret via envFrom below.
          command: ["/app/analytics-api"]
          args: ["-c", "/app/config/analytics.yaml", "run"]
          volumeMounts:
            - name: analytics-config
              mountPath: /app/config/analytics.yaml
              subPath: analytics.yaml
              readOnly: true
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            # Operator MUST pre-create this Secret (umbrella does it
            # automatically as `insight-analytics-api-config`). Provides the
            # APP__gears__analytics_api__config__* leaf overrides.
            - secretRef:
                name: {{ required "existingSecret is required (umbrella provides `insight-analytics-api-config`; standalone installs supply their own)" .Values.existingSecret | quote }}
          securityContext:
            allowPrivilegeEscalation: false
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/analytics-api"]
          args: ["-c", "/app/config/analytics.yaml", "migrate"]
          volumeMounts:
            - name: analytics-config
              mountPath: /app/config/analytics.yaml
              subPath: analytics.yaml
              readOnly: true
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret | quote }}
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: analytics-config
          configMap:
            name: {{ include "insight-analytics-api.fullname" . }}-config
