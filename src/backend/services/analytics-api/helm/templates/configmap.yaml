apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "insight-analytics-api.fullname" . }}-config
  labels:
    {{- include "insight-analytics-api.labels" . | nindent 4 }}
data:
  # gears-rust host config. Structural only — the deployment-specific leaf
  # values (database_url / clickhouse_* / redis_url / identity_url /
  # tenant_default_id) are injected as APP__* env vars from the
  # `insight-analytics-api-config` Secret (see deployment.yaml `envFrom`),
  # which override this YAML at load time.
  #
  # The `api-gateway` system gear is the REST host with auth DISABLED: the
  # platform api-gateway is the sole authenticator and proxies `/analytics`
  # here, so this host injects a single-tenant SecurityContext
  # (DEFAULT_TENANT_ID) and the analytics-api gear overrides the tenant from
  # X-Insight-Tenant-Id when present. NO oidc plugin is registered.
  analytics.yaml: |
    server:
      home_dir: "/app/data"

    logging:
      default:
        console_level: info

    gears:
      api-gateway:
        config:
          bind_addr: "0.0.0.0:{{ .Values.service.port }}"
          # analytics-api is addressed directly (the platform gateway proxies
          # `/analytics` → here), so no prefix_path.
          auth_disabled: true
          cors_enabled: false
          enable_docs: false
          openapi:
            title: "Insight Analytics API"
            version: "0.1.0"
            description: "Read-only query service over predefined ClickHouse metrics"

      gear-orchestrator:
        config: {}

      grpc-hub:
        config:
          listen_addr: "uds:///tmp/analytics-grpc"

      authn-resolver:
        config:
          vendor: "hyperspot"

      authz-resolver:
        config:
          vendor: "hyperspot"

      static-authz-plugin:
        config:
          vendor: "hyperspot"
          priority: 100

      tenant-resolver:
        config:
          vendor: "hyperspot"

      # Derives the tenant from the SecurityContext at request time; with
      # api-gateway.auth_disabled, toolkit-security injects DEFAULT_TENANT_ID.
      single-tenant-tr-plugin:
        config:
          vendor: "hyperspot"
          priority: 20

      # Leaf values (database_url, clickhouse_*, redis_url, identity_url,
      # metric_catalog.tenant_default_id) come from the Secret via envFrom.
      analytics-api:
        config: {}
