# Generated by routegen from routes.yaml at container startup -- DO NOT EDIT.
# Source of truth: routes.yaml (shipped as a ConfigMap / compose mount).
# A route change is a PR to routes.yaml; the container regenerates on restart.
# See docs/components/backend/gateway/DESIGN.md (DD-GW-02, section 3.13).

worker_processes auto;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
}

http {
    server_tokens off;

    # --- OpenResty Lua runtime (DESIGN 3.11; ADR-0001 Option A) ---
    lua_package_path "/etc/nginx/lua/?.lua;;";
    lua_shared_dict jwt_cache 64m;
    resolver local=on ipv6=off;

    init_by_lua_block {
        require("gateway").init({
            authz_url = "http://authenticator.insight.svc.cluster.local:8083/internal/authz",
            authz_connect_timeout_ms = 2000,
            authz_read_timeout_ms = 2000,
        })
    }

    # --- access log: JSON, never a cookie or a JWT (DESIGN 3.14) ---
    log_format gateway_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"correlation_id":"$correlation_id"'
        '}';
    access_log /dev/stdout gateway_json;

    proxy_http_version 1.1;
    # writable temp paths -> non-root + read-only rootfs
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    # --- upstreams (keepalive-pooled) ---
    upstream authenticator { server authenticator.insight.svc.cluster.local:8083; keepalive 32; }
    upstream insight_front { server insight-front.insight.svc.cluster.local:8080; keepalive 32; }
    upstream up_analytics_insight_svc_cluster_local_8081 { server analytics.insight.svc.cluster.local:8081; keepalive 32; }
    upstream up_identity_insight_svc_cluster_local_8082 { server identity.insight.svc.cluster.local:8082; keepalive 32; }

    # coarse per-IP flood guard for /auth/* (G8); precise limiting is in the authenticator
    limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=60r/m;

    server {
        listen 8080;
        server_name _;

        # correlation id is written per request by the Lua exchange
        set $correlation_id "-";

        # the gateway owns security headers regardless of ingress (G9/DD-GW-04)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # --- health: liveness + LOCAL readiness, never gated on a dependency (3.15) ---
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # --- auth API: plain proxy, no exchange (it IS the auth) ---
        location /auth/ {
            limit_req zone=auth_per_ip burst=120 nodelay;
            proxy_pass http://authenticator;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- generated /api routes: full auth + hygiene block per location ---
        # route: /api/v1/analytics -> http://analytics.insight.svc.cluster.local:8081
        location /api/v1/analytics {
            access_by_lua_block { require("gateway").exchange() }
            proxy_pass http://up_analytics_insight_svc_cluster_local_8081;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP "";
            proxy_set_header Forwarded "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering off;
        }

        # route: /api/v1/identity -> http://identity.insight.svc.cluster.local:8082
        location /api/v1/identity {
            access_by_lua_block { require("gateway").exchange() }
            proxy_pass http://up_identity_insight_svc_cluster_local_8082;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP "";
            proxy_set_header Forwarded "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_buffering off;
        }

        # route: /api/v1/stream -> http://analytics.insight.svc.cluster.local:8081
        location /api/v1/stream {
            access_by_lua_block { require("gateway").exchange() }
            proxy_pass http://up_analytics_insight_svc_cluster_local_8081;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP "";
            proxy_set_header Forwarded "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # unmatched /api/* -> 404 (longest-prefix routing means the routes above win)
        location /api/ {
            return 404;
        }

        # /internal/* never routes through the gateway (G4 layer 1)
        location /internal/ {
            return 404;
        }

        # the SPA rides through the gateway: one origin, one __Host- cookie (DD-GW-04)
        location / {
            proxy_pass http://insight_front;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
