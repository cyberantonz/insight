                            action: RETRY
                            http_codes:
                              - 500
                              - 502
                              - 504
                        backoff_strategies:
                          - type: ExponentialBackoffStrategy
                            factor: 5
                  request_parameters:
                    $ref: "#/definitions/linked/HttpRequester/request_parameters"
                  url: https://api.zoom.us/v2/metrics/meetings
                paginator:
                  type: DefaultPaginator
                  page_token_option:
                    type: RequestOption
                    inject_into: request_parameter
                    field_name: next_page_token
                  pagination_strategy:
                    type: CursorPagination
                    cursor_value: "{{ response.get('next_page_token') }}"
                  stop_condition:
                    type: StopCondition
                    condition: "{{ not response.get('next_page_token') }}"
                record_selector:
                  type: RecordSelector
                  extractor:
                    type: DpathExtractor
                    field_path:
                      - meetings
              incremental_sync:
                type: DatetimeBasedCursor
                cursor_field: end_time
                cursor_datetime_formats:
                  - "%Y-%m-%dT%H:%M:%SZ"
                  - "%Y-%m-%dT%H:%M:%S%z"
                start_datetime:
                  type: MinMaxDatetime
                  datetime: >-
                    {{ (now_utc() - duration('P150D')).strftime('%Y-%m-%d') }}
                  datetime_format: "%Y-%m-%d"
                end_datetime:
                  type: MinMaxDatetime
                  datetime: "{{ now_utc().strftime('%Y-%m-%d') }}"
                  datetime_format: "%Y-%m-%d"
                datetime_format: "%Y-%m-%d"
                start_time_option:
                  type: RequestOption
                  field_name: from
