version: 6.60.9

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - meetings

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: SessionTokenAuthenticator
        login_requester:
          type: HttpRequester
          authenticator:
            type: BasicHttpAuthenticator
            username: "{{ config['zoom_client_id'] }}"
            password: "{{ config['zoom_client_secret'] }}"
          http_method: POST
          url: https://zoom.us/oauth/token
          request_body:
            type: RequestBodyUrlEncodedForm
            value:
              grant_type: account_credentials
              account_id: "{{ config['zoom_account_id'] }}"
        expiration_duration: PT1H
        session_token_path:
          - access_token
        request_authentication:
          type: Bearer
      error_handler:
        type: CompositeErrorHandler
        error_handlers:
          - type: DefaultErrorHandler
            response_filters:
              - type: HttpResponseFilter
                action: RATE_LIMITED
                http_codes:
                  - 429
            backoff_strategies:
              - type: WaitTimeFromHeader
                header: Retry-After
          - type: DefaultErrorHandler
            response_filters:
              - type: HttpResponseFilter
                action: RATE_LIMITED
                http_codes:
                  - 503
            backoff_strategies:
              - type: WaitTimeFromHeader
                header: Retry-After
          - type: DefaultErrorHandler
            max_retries: 5
            response_filters:
              - type: HttpResponseFilter
                action: RETRY
                http_codes:
                  - 500
                  - 502
                  - 504
            backoff_strategies:
              - type: ExponentialBackoffStrategy
                factor: 5
      request_body:
        type: RequestBodyUrlEncodedForm
        value:
          grant_type: account_credentials
          account_id: "{{ config['zoom_account_id'] }}"
      request_parameters:
        type: past
        page_size: "{{ config['page_size'] }}"
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestOption
          inject_into: request_parameter
          field_name: next_page_token
        pagination_strategy:
          type: CursorPagination
          cursor_value: "{{ response.get('next_page_token') }}"
        stop_condition:
          type: StopCondition
          condition: "{{ not response.get('next_page_token') }}"

