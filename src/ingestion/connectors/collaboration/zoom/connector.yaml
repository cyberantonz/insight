                  $schema: http://json-schema.org/schema#
                  properties:
                    uuid:
                      type:
                        - string
                        - "null"
                    end_time:
                      type: string
                  additionalProperties: true
      decoder:
        type: JsonDecoder
      requester:
        type: HttpRequester
        authenticator:
          type: SessionTokenAuthenticator
          login_requester:
            type: HttpRequester
            authenticator:
              type: BasicHttpAuthenticator
              username: "{{ config['zoom_client_id'] }}"
              password: "{{ config['zoom_client_secret'] }}"
            http_method: POST
            url: https://zoom.us/oauth/token
            request_body:
              type: RequestBodyUrlEncodedForm
              value:
                grant_type: account_credentials
                account_id: "{{ config['zoom_account_id'] }}"
          expiration_duration: PT1H
          session_token_path:
            - access_token
          request_authentication:
            type: Bearer
        http_method: GET
        error_handler:
          type: CompositeErrorHandler
          error_handlers:
            - type: DefaultErrorHandler
              response_filters:
                - type: HttpResponseFilter
                  action: SUCCESS
                  http_codes:
                    - 404
            - type: DefaultErrorHandler
              response_filters:
                - type: HttpResponseFilter
                  action: RATE_LIMITED
                  http_codes:
                    - 429
              backoff_strategies:
                - type: WaitTimeFromHeader
                  header: Retry-After
                - type: ExponentialBackoffStrategy
                  factor: 10
            - type: DefaultErrorHandler
              response_filters:
                - type: HttpResponseFilter
                  action: RATE_LIMITED
                  http_codes:
                    - 503
              backoff_strategies:
                - type: WaitTimeFromHeader
                  header: Retry-After
            - type: DefaultErrorHandler
              max_retries: 5
              response_filters:
                - type: HttpResponseFilter
                  action: RETRY
                  http_codes:
                    - 500
                    - 502
                    - 504
              backoff_strategies:
                - type: ExponentialBackoffStrategy
                  factor: 5
        request_parameters:
          $ref: "#/definitions/linked/HttpRequester/request_parameters"
        url: >-
          https://api.zoom.us/v2/metrics/meetings/{{ stream_partition.meeting_uuid | replace('/', '%2F') | replace('+', '%2B') | replace('=', '%3D') }}/participants
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestOption
          inject_into: request_parameter
          field_name: next_page_token
        pagination_strategy:
          type: CursorPagination
          cursor_value: "{{ response.get('next_page_token') }}"
        stop_condition:
          type: StopCondition
          condition: "{{ not response.get('next_page_token') }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - participants
    # Formal cursor: the endpoint accepts no time filters (no request options
    # injected) and nothing is filtered client-side — every enumerated
    # meeting's participants are always fully emitted. The cursor exists so
    # the stream is stateful, which is what lets incremental_dependency (on
    # the parent config above) persist the _meetings cursor as parent_state.
    # Duplicates from the parent's P7D lookback re-enumeration are deduped at
    # read time downstream (bronze is append-only ReplacingMergeTree).
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: join_time
      cursor_datetime_formats:
        - "%Y-%m-%dT%H:%M:%SZ"
        - "%Y-%m-%dT%H:%M:%S%z"
      start_datetime:
        type: MinMaxDatetime
        datetime: >-
          {{ (now_utc() - duration('P150D')).strftime('%Y-%m-%d') }}
        datetime_format: "%Y-%m-%d"
      datetime_format: "%Y-%m-%dT%H:%M:%SZ"
    primary_key: unique_key
    schema_loader:
      type: InlineSchemaLoader
      schema:
