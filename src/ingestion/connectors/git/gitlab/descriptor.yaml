name: gitlab
version: "1.7.0"
type: cdk
schedule: "0 2 * * *"
workflow: sync
images:
  cdk:
    name: source-gitlab-insight
    dockerfile: ./Dockerfile
    context: .
    image: "ghcr.io/constructorfabric/source-gitlab-insight:2026.07.24.06.57-6a45eaa"
dbt_select: "tag:gitlab+"
connection:
  namespace: "bronze_gitlab"
secret:
  required_fields:
    - gitlab_url
    - gitlab_token
