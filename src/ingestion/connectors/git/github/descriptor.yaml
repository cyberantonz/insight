name: github
version: "2026.05.04"
# Legacy github connector — superseded by git/github-v2 (separate descriptor).
# No `images:` block declared; no CI build, no Dockerfile in this directory.
# Out of scope for the descriptor.images: migration (ADR-0016) per user
# decision 2026-05-21.
type: cdk
schedule: "0 2 * * *"
workflow: sync
dbt_select: "tag:github+"

connection:
  namespace: "bronze_github"
secret:
  required_fields:
    - github_token
    - github_organizations
    - github_start_date
