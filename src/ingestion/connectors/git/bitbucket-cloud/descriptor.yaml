name: bitbucket-cloud
version: "1.5.0"
type: cdk
# 05:00 — dedicated slot: the 02:00 slot is shared with cursor + m365 and the
# single-worker node starves replication pods there (Broken-pipe startup
# deaths, Temporal activity timeouts — jobs 432/454 on 2026-07-15/16).
schedule: "0 5 * * *"
workflow: sync
# CI build metadata + runtime image refs (ADR-0016).
images:
  cdk:
    name: source-bitbucket-cloud-insight
    dockerfile: ./Dockerfile
    context: .
    image: "ghcr.io/constructorfabric/source-bitbucket-cloud-insight:2026.07.23.14.44-dbfed6e"
dbt_select: "tag:bitbucket-cloud+"
connection:
  namespace: "bronze_bitbucket_cloud"
secret:
  required_fields:
    - bitbucket_token
    - bitbucket_workspaces
