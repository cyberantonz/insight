# Two-service stack for the bronze-to-API E2E test framework.
#
# Ports are bound to 127.0.0.1 only (per cpt-bronze-to-api-e2e-constraint-loopback-only).
# Versions are pinned to production parity (per cpt-bronze-to-api-e2e-constraint-version-parity);
# update both pins together when the prod Helm chart bumps either image.
#
# Credentials are passed via .env (generated per-session by lib.config) and
# MUST NOT be committed.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8.4.13
    container_name: insight-e2e-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "127.0.0.1:${CH_HTTP_PORT:-30523}:8123"
      - "127.0.0.1:${CH_NATIVE_PORT:-30529}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    networks:
      - insight-e2e

  mariadb:
    image: mariadb:11.4.4
    container_name: insight-e2e-mariadb
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MARIADB_PORT:-30506}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    networks:
      - insight-e2e

networks:
  insight-e2e:
    name: insight-e2e
    driver: bridge
