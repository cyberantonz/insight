spec_version: 1
description: >
  Task Delivery - task_reopen_rate - JIRA, IC Bullet Task Delivery (...0011),
  department-of-5 distribution + 6 stats in a single custom window.

  bronze -> silver -> gold: jira_issue (Closed) + jira_issue_history (close/reopen
  chains) + jira_user; bamboohr employees give the Engineering org_unit_id (the
  cohort). task_reopen_rate = 100 * reopens / closes, gated to require >= 5 closes
  per person. Every member is built to have EXACTLY 5 closes (gate met) and a
  rank-dependent reopen count so rate = 100*reopens/5.

  Building blocks per issue: simple = In Progress->Closed (1 close, 0 reopen);
  crc = In Progress->Closed->In Progress->Closed (2 closes, 1 reopen); cc3 =
  ...->Closed x3 (3 closes, 2 reopens). Department of 5:
    alice(r=1): 5 simple                 -> 0 reopens / 5 -> rate NULL (see below)
    bob  (r=2): 3 simple + 1 crc         -> 1 reopen  / 5 -> 20%
    carol(r=3): 1 simple + 2 crc         -> 2 reopens / 5 -> 40%
    dave (r=4): 1 cc3 + 1 crc            -> 3 reopens / 5 -> 60%
    erin (r=5): 1 issue, 5-close chain   -> 4 reopens / 5 -> 80%
  NOTE alice has closes but ZERO reopens, so the query_ref numerator
  sumIf(metric_value < 0) is a sum over NO rows = NULL (not 0) → alice's rate is
  NULL and she drops OUT of the distribution. The cohort is therefore the 4 people
  {20,40,60,80} (an even set: ClickHouse quantileExact returns the upper-middle).
  The IC case requests erin (5): value=80, median=60, range_min=20, range_max=80,
  p25=40, p75=80. Empty window 2026-06 -> no items.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

