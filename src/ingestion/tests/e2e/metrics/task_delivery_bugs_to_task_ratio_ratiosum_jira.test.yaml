spec_version: 1
description: >
  Task Delivery - bugs_to_task_ratio - JIRA, RATIO-OF-SUMS correctness guard,
  department-of-5 distribution + 6 stats in a single custom window.

  bronze -> silver -> gold: jira_issue + jira_issue_history (Status->Closed event =
  the close date) + jira_user; issuetype lives in custom_fields_json. Per
  (person, close-day): tasks_closed = count() of ALL closed issues, bugs_fixed =
  countIf(issuetype='Bug'). The ...0011 query_ref aggregates over the PERIOD as a
  RATIO-OF-SUMS: 100 * Sum(bugs_fixed) / Sum(tasks_closed) — NOT the average of the
  daily ratios.

  This spec's point: erin has TWO close-days with UNEQUAL counts:
    day A 2026-12-24: 4 closed, 1 Bug + 3 Task (daily ratio 25%)
    day B 2026-12-25: 1 closed, 1 Bug           (daily ratio 100%)
  Ratio-of-sums = 100 * (1+1) / (4+1) = 100*2/5 = 40. The WRONG answer this guards
  against is average-of-daily = (25+100)/2 = 62.5.

  Department of 5 (single close-day 2026-12-25 for the others):
    alice: 4 closed, 0 bugs -> 0%
    bob:   5 closed, 1 bug  -> 20%
    carol: 5 closed, 3 bugs -> 60%
    dave:  5 closed, 4 bugs -> 80%
    erin:  ratio-of-sums    -> 40%
  Cohort sorted = {0,20,40,60,80}. The IC case requests erin (40): value=40,
  median=40, range_min=0, range_max=80, p25=20, p75=60. range_max = plain cohort
  max (not a P95 metric). Empty window 2026-06 -> no items.

