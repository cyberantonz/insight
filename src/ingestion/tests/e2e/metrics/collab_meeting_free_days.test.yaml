spec_version: 1
description: >
  Metric: collab.meeting_free_days.
  How it's computed (bronze → silver → gold):
    • bronze: daily Teams meeting report + Zoom participant sessions per person
    • silver: both sources deduped to per-person/day meeting durations (audio/video/screen)
    • gold:   a DAY is "meeting-free" when the person has deliberate collaboration
              activity but no meeting time; the metric is the COUNT of such days over
              the window. value = the requested member's meeting-free
              day count; median/p25/p75/range = the distribution of those per-person
              counts across the member's DEPARTMENT (same org_unit_id).

  Count-of-days design (this metric counts DAYS, not magnitudes): each member m ∈
  {alice:1, bob:2, carol:3, dave:4, erin:5} is seeded m active, zero-duration Teams
  rows — one chat message, no attended meetings, and PT0S audio/video/screen — on m distinct days inside
  the queried window, so the per-person meeting-free count = m → department
  {1,2,3,4,5}. The IC case requests erin (m=5), so value = 5; the department of 5
  yields the median/p25/p75/range below (a reviewer can verify by counting each
  member's seeded dates).

  dave/erin Teams rows are composed inline from the base m365_teams template with a
  userPrincipalName override (named per-person Teams records cover alice/bob/carol).
  Cases: custom scope (department of 5) · empty window.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_m365.teams_activity:
    # ── alice: 1 meeting-free day(s) in window
    - { $ref: templates/m365_teams.yaml#/templates/alice_teams, reportRefreshDate: "2026-12-23", unique_key: mf-alice-20261223, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    # ── bob: 2 meeting-free day(s) in window
    - { $ref: templates/m365_teams.yaml#/templates/bob_teams, reportRefreshDate: "2026-12-23", unique_key: mf-bob-20261223, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/bob_teams, reportRefreshDate: "2026-12-24", unique_key: mf-bob-20261224, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    # ── carol: 3 meeting-free day(s) in window
    - { $ref: templates/m365_teams.yaml#/templates/carol_teams, reportRefreshDate: "2026-12-23", unique_key: mf-carol-20261223, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/carol_teams, reportRefreshDate: "2026-12-24", unique_key: mf-carol-20261224, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/carol_teams, reportRefreshDate: "2026-12-25", unique_key: mf-carol-20261225, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    # ── dave: 4 meeting-free day(s) in window
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: dave@example.com, reportRefreshDate: "2026-12-23", unique_key: mf-dave-20261223, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: dave@example.com, reportRefreshDate: "2026-12-24", unique_key: mf-dave-20261224, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: dave@example.com, reportRefreshDate: "2026-12-25", unique_key: mf-dave-20261225, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: dave@example.com, reportRefreshDate: "2026-12-26", unique_key: mf-dave-20261226, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    # ── erin: 5 meeting-free day(s) in window
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: erin@example.com, reportRefreshDate: "2026-12-23", unique_key: mf-erin-20261223, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: erin@example.com, reportRefreshDate: "2026-12-24", unique_key: mf-erin-20261224, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: erin@example.com, reportRefreshDate: "2026-12-25", unique_key: mf-erin-20261225, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: erin@example.com, reportRefreshDate: "2026-12-26", unique_key: mf-erin-20261226, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: erin@example.com, reportRefreshDate: "2026-12-27", unique_key: mf-erin-20261227, teamChatMessageCount: 1, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }

cases:
  - name: collab.meeting_free_days
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2026-12-01", to: "2026-12-31" }
        metrics:
          - metric_key: collab.meeting_free_days
            views:
              - { view: period }
              - { view: peer }
              - { view: timeseries, bucket: day }
    expect:
      - assert: "status == 200"
      - metric: collab.meeting_free_days
        view: period
        find: { entity_id: erin@example.com }
        equal: { value: 5 }
      - metric: collab.meeting_free_days
        view: peer
        find: { entity_id: erin@example.com }
        equal: { target_value: 5, p25: 2, median: 3, p75: 4, min: 1, max: 5, n: 5 }
      - metric: collab.meeting_free_days
        view: timeseries
        assert: "items.exists(s, s.entity_id == 'erin@example.com' && size(s.points.filter(p, double(p.value) == 1.0)) == 5 && s.points.exists(p, p.bucket_start == '2026-12-23' && double(p.value) == 1.0) && s.points.exists(p, p.bucket_start == '2026-12-24' && double(p.value) == 1.0) && s.points.exists(p, p.bucket_start == '2026-12-25' && double(p.value) == 1.0) && s.points.exists(p, p.bucket_start == '2026-12-26' && double(p.value) == 1.0) && s.points.exists(p, p.bucket_start == '2026-12-27' && double(p.value) == 1.0))"

  - name: collab.meeting_free_days empty window
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2026-01-01", to: "2026-01-31" }
        metrics: [{ metric_key: collab.meeting_free_days, views: [{ view: period }] }]
    expect:
      - assert: "status == 200"
      - { metric: collab.meeting_free_days, view: period, find: { entity_id: erin@example.com }, equal: { value: null } }
