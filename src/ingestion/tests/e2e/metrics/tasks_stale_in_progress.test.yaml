cases:
  - name: tasks.stale_in_progress
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2026-01-01", to: "2026-12-31" }
        metrics:
          - metric_key: tasks.stale_in_progress
            views:
              - { view: period }
              - { view: peer }
              - { view: timeseries, bucket: day }
    expect:
      - assert: "status == 200"
      - metric: tasks.stale_in_progress
        view: period
        find: { entity_id: erin@example.com }
        equal: { value: 5 }
      - metric: tasks.stale_in_progress
        view: peer
        find: { entity_id: erin@example.com }
        equal: { target_value: 5, p25: 2, median: 3, p75: 4, min: 1, max: 5, n: 5 }
      - metric: tasks.stale_in_progress
        view: timeseries
        assert: "items.exists(s, s.entity_id == 'erin@example.com' && s.points.exists(p, double(p.value) == 5.0))"

  - name: tasks.stale_in_progress out of window
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2025-01-01", to: "2025-01-31" }
        metrics: [{ metric_key: tasks.stale_in_progress, views: [{ view: period }] }]
    expect:
      - assert: "status == 200"
      - { metric: tasks.stale_in_progress, view: period, find: { entity_id: erin@example.com }, equal: { value: null } }
