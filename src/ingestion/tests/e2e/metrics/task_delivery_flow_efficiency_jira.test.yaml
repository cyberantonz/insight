spec_version: 1
description: >
  Task Delivery - flow_efficiency - JIRA, IC Bullet Task Delivery (...0011),
  department-of-5 distribution + 6 stats in a single custom window.

  bronze -> silver -> gold: jira_issue (Closed) + jira_issue_history (Open ->
  In Progress -> Closed) + jira_user; bamboohr employees give the Engineering
  org_unit_id (the cohort). jira-enrich reconstructs status intervals;
  flow_efficiency = 100 * active-dev (In Progress) time / total lead time. The
  ...0011 query_ref takes the per-person value; median/p25/p75/range = the
  department distribution. range_max here = plain cohort max (flow is NOT a
  P95 long-tail metric).

  Department: 5 Engineering members alice..erin of rank r in 1..5. Every issue has
  lead = 5 days (created 2026-03-20 -> Closed 2026-03-25); dev time = r days ending
  at close, so In Progress starts at 2026-03-(25-r). r<5 members open first;
  erin (r=5) is created directly In Progress. flow = 100*r/5 = {20,40,60,80,100}%.
  The IC case requests erin (5): value=100, median=60, range_min=20, range_max=100,
  p25=40, p75=80. Empty window 2026-06 -> no items.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_jira.jira_user:
    - { $ref: templates/jira_task.yaml#/templates/jira_user, unique_key: jira-test-alice-jira-acct, account_id: alice-jira-acct, email: alice@example.com, display_name: Alice Alpha }
    - { $ref: templates/jira_task.yaml#/templates/jira_user, unique_key: jira-test-bob-jira-acct, account_id: bob-jira-acct, email: bob@example.com, display_name: Bob Beta }
    - { $ref: templates/jira_task.yaml#/templates/jira_user, unique_key: jira-test-carol-jira-acct, account_id: carol-jira-acct, email: carol@example.com, display_name: Carol Gamma }
    - { $ref: templates/jira_task.yaml#/templates/jira_user, unique_key: jira-test-dave-jira-acct, account_id: dave-jira-acct, email: dave@example.com, display_name: Dave Delta }
    - { $ref: templates/jira_task.yaml#/templates/jira_user, unique_key: jira-test-erin-jira-acct, account_id: erin-jira-acct, email: erin@example.com, display_name: Erin Epsilon }

  bronze_jira.jira_statuses:
    - $ref: templates/jira_task.yaml#/templates/status_open
    - $ref: templates/jira_task.yaml#/templates/status_in_progress
    - $ref: templates/jira_task.yaml#/templates/status_closed

  bronze_jira.jira_fields:
    - $ref: templates/jira_task.yaml#/templates/field_status
    - $ref: templates/jira_task.yaml#/templates/field_assignee
    - $ref: templates/jira_task.yaml#/templates/field_issuetype

  bronze_jira.jira_issue:
    # Every member: created 2026-03-20T00:00, closed 2026-03-25T00:00 (lead = 5 days).
    - { $ref: templates/jira_task.yaml#/templates/jira_issue, id: FEA-1, jira_id: FEA-1, unique_key: jira-test-FEA-1, id_readable: FEA1, created: "2026-03-20T00:00:00", custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"alice-jira-acct","displayName":"Alice Alpha"}}' }
    - { $ref: templates/jira_task.yaml#/templates/jira_issue, id: FEB-1, jira_id: FEB-1, unique_key: jira-test-FEB-1, id_readable: FEB1, created: "2026-03-20T00:00:00", custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"bob-jira-acct","displayName":"Bob Beta"}}' }
    - { $ref: templates/jira_task.yaml#/templates/jira_issue, id: FEC-1, jira_id: FEC-1, unique_key: jira-test-FEC-1, id_readable: FEC1, created: "2026-03-20T00:00:00", custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"carol-jira-acct","displayName":"Carol Gamma"}}' }
    - { $ref: templates/jira_task.yaml#/templates/jira_issue, id: FED-1, jira_id: FED-1, unique_key: jira-test-FED-1, id_readable: FED1, created: "2026-03-20T00:00:00", custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"dave-jira-acct","displayName":"Dave Delta"}}' }
    - { $ref: templates/jira_task.yaml#/templates/jira_issue, id: FEE-1, jira_id: FEE-1, unique_key: jira-test-FEE-1, id_readable: FEE1, created: "2026-03-20T00:00:00", custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"erin-jira-acct","displayName":"Erin Epsilon"}}' }

  bronze_jira.jira_issue_history:
    # alice..dave (r<5): Open -> In Progress at 2026-03-(25-r); then In Progress -> Closed at 12-25.
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: FEA1, changelog_id: "54001", unique_key: jira-test-FEA1-54001, created_at: "2026-03-24T00:00:00.000+0000", author_account_id: alice-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"Open","from":"1","toString":"In Progress","to":"3"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: FEA1, changelog_id: "54002", unique_key: jira-test-FEA1-54002, created_at: "2026-03-25T00:00:00.000+0000", author_account_id: alice-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: FEB1, changelog_id: "54003", unique_key: jira-test-FEB1-54003, created_at: "2026-03-23T00:00:00.000+0000", author_account_id: bob-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"Open","from":"1","toString":"In Progress","to":"3"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: FEB1, changelog_id: "54004", unique_key: jira-test-FEB1-54004, created_at: "2026-03-25T00:00:00.000+0000", author_account_id: bob-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: FEC1, changelog_id: "54005", unique_key: jira-test-FEC1-54005, created_at: "2026-03-22T00:00:00.000+0000", author_account_id: carol-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"Open","from":"1","toString":"In Progress","to":"3"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: FEC1, changelog_id: "54006", unique_key: jira-test-FEC1-54006, created_at: "2026-03-25T00:00:00.000+0000", author_account_id: carol-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: FED1, changelog_id: "54007", unique_key: jira-test-FED1-54007, created_at: "2026-03-21T00:00:00.000+0000", author_account_id: dave-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"Open","from":"1","toString":"In Progress","to":"3"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: FED1, changelog_id: "54008", unique_key: jira-test-FED1-54008, created_at: "2026-03-25T00:00:00.000+0000", author_account_id: dave-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]' }
    # erin (r=5): dev = lead = 5 days -> created directly In Progress, single close row.
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: FEE1, changelog_id: "54009", unique_key: jira-test-FEE1-54009, created_at: "2026-03-25T00:00:00.000+0000", author_account_id: erin-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]' }

cases:
  - name: "flow_efficiency — custom scope (department of 5)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: task_delivery
            metric_id: 00000000-0000-0000-0001-000000000011
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-03-20' and metric_date le '2026-03-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: task_delivery
        assert: "result.status == 'ok'"
      - in: task_delivery
        find: { metric_key: flow_efficiency }
        equal: { value: 100, median: 60, range_min: 20, range_max: 100, p25: 40, p75: 80 }

  - name: "flow_efficiency — empty window (no data → no items)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: task_delivery
            metric_id: 00000000-0000-0000-0001-000000000011
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-06-01' and metric_date le '2026-06-30'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: task_delivery
        assert: "result.status == 'ok'"
      - in: task_delivery
        assert: "size(items) == 0"
