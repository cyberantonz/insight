spec_version: 1
description: >
  Metric: m365_files_shared_internal — IC Bullet Collaboration (…0012), #1413.
  How it's computed (bronze → silver → gold):
    • bronze: daily OneDrive and SharePoint file-activity reports per person
    • silver: each product deduped to per-person/day share counts
    • gold:   value = the requested member's per-person SUM of files shared
              internally over the window (across both products); median/p25/p75/range
              = the distribution of those per-person SUMs across the member's
              DEPARTMENT (same org_unit_id).

  Department: 5 Engineering members (alice, bob, carol, dave, erin), base rates
  r ∈ {10,20,30,40,50}, each seeded one OneDrive row on the same day inside the
  queried window → per-person window SUM = r. The IC case requests erin (r=50), so
  value = 50; the department of 5 yields the median/p25/p75/range below.

  dave/erin OneDrive rows are composed inline from the base m365_onedrive template
  with a userPrincipalName override (named per-person records cover alice/bob/carol).
  Cases: custom scope (department of 5) · empty window.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_m365.onedrive_activity:
    - { $ref: templates/m365_onedrive.yaml#/templates/alice_onedrive, reportRefreshDate: "2026-12-25", unique_key: int-alice-20261225, sharedInternallyFileCount: 10 }   # r=10
    - { $ref: templates/m365_onedrive.yaml#/templates/alice_onedrive, reportRefreshDate: "2026-12-25", unique_key: int-alice-20261225, sharedInternallyFileCount: 10 }   # duplicate → dedup to 10, not 20
    - { $ref: templates/m365_onedrive.yaml#/templates/bob_onedrive,   reportRefreshDate: "2026-12-25", unique_key: int-bob-20261225,   sharedInternallyFileCount: 20 }   # r=20
    - { $ref: templates/m365_onedrive.yaml#/templates/carol_onedrive, reportRefreshDate: "2026-12-25", unique_key: int-carol-20261225, sharedInternallyFileCount: 30 }   # r=30
    - { $ref: templates/m365_onedrive.yaml#/templates/m365_onedrive, userPrincipalName: dave@example.com, reportRefreshDate: "2026-12-25", unique_key: int-dave-20261225, sharedInternallyFileCount: 40 }   # r=40 (inline base + UPN override)
    - { $ref: templates/m365_onedrive.yaml#/templates/m365_onedrive, userPrincipalName: erin@example.com, reportRefreshDate: "2026-12-25", unique_key: int-erin-20261225, sharedInternallyFileCount: 50 }   # r=50 (the requested IC member; inline base + UPN override)

cases:
  - name: collab.files_shared_internal
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2026-12-01", to: "2026-12-31" }
        metrics:
          - metric_key: collab.files_shared_internal
            views:
              - { view: period }
              - { view: peer }
              - { view: timeseries, bucket: day }
              - { view: breakdown, dimensions: [tool] }
          - metric_key: collab.files_shared
            views:
              - { view: period }
              - { view: peer }
              - { view: timeseries, bucket: day }
              - { view: breakdown, dimensions: [scope] }
    expect:
      - assert: "status == 200"
      - metric: collab.files_shared_internal
        view: period
        find: { entity_id: erin@example.com }
        equal: { value: 50 }
      - metric: collab.files_shared_internal
        view: peer
        find: { entity_id: erin@example.com }
        equal: { target_value: 50, p25: 20, median: 30, p75: 40, min: 10, max: 50, n: 5 }
      - metric: collab.files_shared_internal
        view: timeseries
        assert: "items.exists(s, s.entity_id == 'erin@example.com' && s.points.exists(p, p.bucket_start == '2026-12-25' && double(p.value) == 50.0))"
      - metric: collab.files_shared_internal
        view: breakdown
        assert: "items.exists(v, v.entity_id == 'erin@example.com' && v.dimensions.exists(d, d.key == 'tool' && d.value == 'm365') && double(v.value) == 50.0)"
      - metric: collab.files_shared
        view: period
        find: { entity_id: erin@example.com }
        equal: { value: 50 }
      - metric: collab.files_shared
        view: peer
        find: { entity_id: erin@example.com }
        equal: { target_value: 50, p25: 20, median: 30, p75: 40, min: 10, max: 50, n: 5 }
      - metric: collab.files_shared
        view: timeseries
        assert: "items.exists(s, s.entity_id == 'erin@example.com' && s.points.exists(p, p.bucket_start == '2026-12-25' && double(p.value) == 50.0))"
      - metric: collab.files_shared
        view: breakdown
        assert: "items.exists(v, v.entity_id == 'erin@example.com' && v.dimensions.exists(d, d.key == 'scope' && d.value == 'internal') && double(v.value) == 50.0)"

  - name: Unified internal file sharing empty window
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2026-01-01", to: "2026-01-31" }
        metrics:
          - { metric_key: collab.files_shared_internal, views: [{ view: period }] }
          - { metric_key: collab.files_shared, views: [{ view: period }] }
    expect:
      - assert: "status == 200"
      - { metric: collab.files_shared_internal, view: period, find: { entity_id: erin@example.com }, equal: { value: null } }
      - { metric: collab.files_shared, view: period, find: { entity_id: erin@example.com }, equal: { value: null } }
