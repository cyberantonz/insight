spec_version: 1
description: >
  Metric: wiki_comments (Confluence) — IC Bullet Wiki (…0041), #1440. SINGLE-WINDOW fixture.
  Department of 5 Engineering members (alice…erin); requested IC member = erin.
  One narrow custom window (2026-08-02 … 2026-08-08) holds ALL of this
  fixture's rows (dated 2026-08-05); a second case probes an empty window.

  ISOLATION: silver.class_wiki_pages / class_wiki_engagement are incremental
  delete+insert tables the e2e rig resets only at SESSION START — the per-test
  ledger truncates only the bronze a fixture seeds, so a sibling fixture's silver
  rows persist across tests. Every wiki fixture is therefore pinned to its OWN
  disjoint date + window so a leaked foreign row falls OUTSIDE this window and
  cannot perturb the stats. Anchor pages are dated 2025-06-15 (outside ALL windows) for the engagement INNER JOIN; per-person value = Σ comments received in the window = m → dept {1,2,3,4,5}.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin
  bronze_outline.wiki_pages:
    - { $ref: "templates/outline_wiki_pages.yaml#/templates/alice", page_id: cp-alice-1, unique_key: cf-alice-1, version_number: 1, created_at: "2025-06-15T00:00:00Z" }   # anchor (outside all windows)
    - { $ref: "templates/outline_wiki_pages.yaml#/templates/bob", page_id: cp-bob-1, unique_key: cf-bob-1, version_number: 1, created_at: "2025-06-15T00:00:00Z" }   # anchor (outside all windows)
    - { $ref: "templates/outline_wiki_pages.yaml#/templates/carol", page_id: cp-carol-1, unique_key: cf-carol-1, version_number: 1, created_at: "2025-06-15T00:00:00Z" }   # anchor (outside all windows)
    - { $ref: "templates/outline_wiki_pages.yaml#/templates/dave", page_id: cp-dave-1, unique_key: cf-dave-1, version_number: 1, created_at: "2025-06-15T00:00:00Z" }   # anchor (outside all windows)
    - { $ref: "templates/outline_wiki_pages.yaml#/templates/erin", page_id: cp-erin-1, unique_key: cf-erin-1, version_number: 1, created_at: "2025-06-15T00:00:00Z" }   # anchor (outside all windows)
  bronze_outline.wiki_comments:
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-alice-1, comment_id: falice-1, unique_key: fc-alice-1, created_at: "2026-08-05T01:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-bob-1, comment_id: fbob-1, unique_key: fc-bob-1, created_at: "2026-08-05T01:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-bob-1, comment_id: fbob-2, unique_key: fc-bob-2, created_at: "2026-08-05T02:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-carol-1, comment_id: fcarol-1, unique_key: fc-carol-1, created_at: "2026-08-05T01:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-carol-1, comment_id: fcarol-2, unique_key: fc-carol-2, created_at: "2026-08-05T02:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-carol-1, comment_id: fcarol-3, unique_key: fc-carol-3, created_at: "2026-08-05T03:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-dave-1, comment_id: fdave-1, unique_key: fc-dave-1, created_at: "2026-08-05T01:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-dave-1, comment_id: fdave-2, unique_key: fc-dave-2, created_at: "2026-08-05T02:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-dave-1, comment_id: fdave-3, unique_key: fc-dave-3, created_at: "2026-08-05T03:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-dave-1, comment_id: fdave-4, unique_key: fc-dave-4, created_at: "2026-08-05T04:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-erin-1, comment_id: ferin-1, unique_key: fc-erin-1, created_at: "2026-08-05T01:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-erin-1, comment_id: ferin-2, unique_key: fc-erin-2, created_at: "2026-08-05T02:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: cp-erin-1, comment_id: ferin-3, unique_key: fc-erin-3, created_at: "2026-08-05T03:00:00Z" }
