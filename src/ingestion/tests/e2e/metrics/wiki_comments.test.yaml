cases:
  - name: wiki.comments
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2026-08-02", to: "2026-08-08" }
        metrics:
          - metric_key: wiki.comments
            views:
              - { view: period }
              - { view: peer }
              - { view: timeseries, bucket: day }
    expect:
      - assert: "status == 200"
      - metric: wiki.comments
        view: period
        find: { entity_id: erin@example.com }
        equal: { value: 5 }
      - metric: wiki.comments
        view: peer
        find: { entity_id: erin@example.com }
        equal: { target_value: 5, p25: 2, median: 3, p75: 4, min: 1, max: 5, n: 5 }
      - metric: wiki.comments
        view: timeseries
        assert: "items.exists(s, s.entity_id == 'erin@example.com' && s.points.exists(p, double(p.value) == 5.0))"

  - name: wiki.comments empty window
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2025-01-01", to: "2025-01-31" }
        metrics: [{ metric_key: wiki.comments, views: [{ view: period }] }]
    expect:
      - assert: "status == 200"
      - { metric: wiki.comments, view: period, find: { entity_id: erin@example.com }, equal: { value: null } }
