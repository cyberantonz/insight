spec_version: 1
description: >
  Task Delivery - worklog_logging_accuracy - JIRA, IC Bullet Task Delivery (...0011),
  department-of-5 distribution + 6 stats in a single custom window.

  bronze -> silver -> gold: jira_issue (Closed) + jira_issue_history (In Progress
  interval) + jira_worklogs (the logged seconds) + jira_user; bamboohr employees
  give the Engineering org_unit_id (the cohort). The changelog gives the in-progress
  seconds (denominator); the worklog rows give the logged seconds (numerator).
  worklog_logging_accuracy = least(100, 100 * Sum(worklog_seconds) /
  Sum(in_progress_seconds)). This is the only Task Delivery metric whose numerator
  comes from the worklog stream, so the test seeds that table too. range_max here
  = plain cohort max (not a P95 metric).

  Department: 5 Engineering members alice..erin of rank r in 1..5. Each issue is
  In Progress for exactly 1 day (86400 s) on 2026-03-25 (created In Progress
  2026-03-25T00:00, Closed 2026-03-26T00:00); the worklog logs r*17280 seconds =
  {17280,34560,51840,69120,86400} = {20,40,60,80,100}% of 86400 -> accuracy =
  {20,40,60,80,100}. The IC case requests erin (5): value=100, median=60,
  range_min=20, range_max=100, p25=40, p75=80. Empty window 2026-06 -> no items.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_jira.jira_user:
    - { $ref: templates/jira_task.yaml#/templates/jira_user, unique_key: jira-test-alice-jira-acct, account_id: alice-jira-acct, email: alice@example.com, display_name: Alice Alpha }
    - { $ref: templates/jira_task.yaml#/templates/jira_user, unique_key: jira-test-bob-jira-acct, account_id: bob-jira-acct, email: bob@example.com, display_name: Bob Beta }
    - { $ref: templates/jira_task.yaml#/templates/jira_user, unique_key: jira-test-carol-jira-acct, account_id: carol-jira-acct, email: carol@example.com, display_name: Carol Gamma }
    - { $ref: templates/jira_task.yaml#/templates/jira_user, unique_key: jira-test-dave-jira-acct, account_id: dave-jira-acct, email: dave@example.com, display_name: Dave Delta }
    - { $ref: templates/jira_task.yaml#/templates/jira_user, unique_key: jira-test-erin-jira-acct, account_id: erin-jira-acct, email: erin@example.com, display_name: Erin Epsilon }

  bronze_jira.jira_statuses:
    - $ref: templates/jira_task.yaml#/templates/status_open
    - $ref: templates/jira_task.yaml#/templates/status_in_progress
    - $ref: templates/jira_task.yaml#/templates/status_closed

  bronze_jira.jira_fields:
    - $ref: templates/jira_task.yaml#/templates/field_status
    - $ref: templates/jira_task.yaml#/templates/field_assignee
    - $ref: templates/jira_task.yaml#/templates/field_issuetype

  bronze_jira.jira_issue:
    # Each member: created In Progress 2026-03-25T00:00, Closed 2026-03-26T00:00 -> 86400 s in progress on 12-25.
    - { $ref: templates/jira_task.yaml#/templates/jira_issue, id: WLA-1, jira_id: WLA-1, unique_key: jira-test-WLA-1, id_readable: WLA1, created: "2026-03-25T00:00:00", custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"alice-jira-acct","displayName":"Alice Alpha"}}' }
    - { $ref: templates/jira_task.yaml#/templates/jira_issue, id: WLB-1, jira_id: WLB-1, unique_key: jira-test-WLB-1, id_readable: WLB1, created: "2026-03-25T00:00:00", custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"bob-jira-acct","displayName":"Bob Beta"}}' }
    - { $ref: templates/jira_task.yaml#/templates/jira_issue, id: WLC-1, jira_id: WLC-1, unique_key: jira-test-WLC-1, id_readable: WLC1, created: "2026-03-25T00:00:00", custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"carol-jira-acct","displayName":"Carol Gamma"}}' }
    - { $ref: templates/jira_task.yaml#/templates/jira_issue, id: WLD-1, jira_id: WLD-1, unique_key: jira-test-WLD-1, id_readable: WLD1, created: "2026-03-25T00:00:00", custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"dave-jira-acct","displayName":"Dave Delta"}}' }
    - { $ref: templates/jira_task.yaml#/templates/jira_issue, id: WLE-1, jira_id: WLE-1, unique_key: jira-test-WLE-1, id_readable: WLE1, created: "2026-03-25T00:00:00", custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"erin-jira-acct","displayName":"Erin Epsilon"}}' }

  bronze_jira.jira_issue_history:
    # Single In Progress -> Closed at 2026-03-26T00:00 -> in-progress interval = 86400 s on 12-25.
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: WLA1, changelog_id: "56001", unique_key: jira-test-WLA1-56001, created_at: "2026-03-26T00:00:00.000+0000", author_account_id: alice-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: WLB1, changelog_id: "56002", unique_key: jira-test-WLB1-56002, created_at: "2026-03-26T00:00:00.000+0000", author_account_id: bob-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: WLC1, changelog_id: "56003", unique_key: jira-test-WLC1-56003, created_at: "2026-03-26T00:00:00.000+0000", author_account_id: carol-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: WLD1, changelog_id: "56004", unique_key: jira-test-WLD1-56004, created_at: "2026-03-26T00:00:00.000+0000", author_account_id: dave-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]' }
    - { $ref: templates/jira_task.yaml#/templates/jira_history, id_readable: WLE1, changelog_id: "56005", unique_key: jira-test-WLE1-56005, created_at: "2026-03-26T00:00:00.000+0000", author_account_id: erin-jira-acct, items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]' }

  bronze_jira.jira_worklogs:
    # r*17280 s logged on 2026-03-25 per member (author_account_id overridden per member).
    - { $ref: templates/jira_task.yaml#/templates/jira_worklog, worklog_id: WL1-1, id_readable: WLA1, unique_key: jira-test-worklog-WLA-1, author_account_id: alice-jira-acct, started: "2026-03-25T10:00:00.000+0000", time_spent_seconds: 17280, _airbyte_raw_id: "00000000-0000-0000-0000-000000000001" }
    - { $ref: templates/jira_task.yaml#/templates/jira_worklog, worklog_id: WL2-1, id_readable: WLB1, unique_key: jira-test-worklog-WLB-1, author_account_id: bob-jira-acct, started: "2026-03-25T10:00:00.000+0000", time_spent_seconds: 34560, _airbyte_raw_id: "00000000-0000-0000-0000-000000000002" }
    - { $ref: templates/jira_task.yaml#/templates/jira_worklog, worklog_id: WL3-1, id_readable: WLC1, unique_key: jira-test-worklog-WLC-1, author_account_id: carol-jira-acct, started: "2026-03-25T10:00:00.000+0000", time_spent_seconds: 51840, _airbyte_raw_id: "00000000-0000-0000-0000-000000000003" }
    - { $ref: templates/jira_task.yaml#/templates/jira_worklog, worklog_id: WL4-1, id_readable: WLD1, unique_key: jira-test-worklog-WLD-1, author_account_id: dave-jira-acct, started: "2026-03-25T10:00:00.000+0000", time_spent_seconds: 69120, _airbyte_raw_id: "00000000-0000-0000-0000-000000000004" }
    - { $ref: templates/jira_task.yaml#/templates/jira_worklog, worklog_id: WL5-1, id_readable: WLE1, unique_key: jira-test-worklog-WLE-1, author_account_id: erin-jira-acct, started: "2026-03-25T10:00:00.000+0000", time_spent_seconds: 86400, _airbyte_raw_id: "00000000-0000-0000-0000-000000000005" }

cases:
  - name: "worklog_logging_accuracy — custom scope (department of 5)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: task_delivery
            metric_id: 00000000-0000-0000-0001-000000000011
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-03-20' and metric_date le '2026-03-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: task_delivery
        assert: "result.status == 'ok'"
      - in: task_delivery
        find: { metric_key: worklog_logging_accuracy }
        equal: { value: 100, median: 60, range_min: 20, range_max: 100, p25: 40, p75: 80 }

  - name: "worklog_logging_accuracy — empty window (no data → no items)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: task_delivery
            metric_id: 00000000-0000-0000-0001-000000000011
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-06-01' and metric_date le '2026-06-30'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: task_delivery
        assert: "result.status == 'ok'"
      - in: task_delivery
        assert: "size(items) == 0"
