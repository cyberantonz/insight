spec_version: 1
description: >
  Metric: m365_emails_read — IC Bullet Collaboration (…0012), #1413.
  How it's computed (bronze → silver → gold):
    • bronze: daily M365 email-activity report per person (send/receive/read counts)
    • silver: deduped to one row per person/day with the read-email count
    • gold:   value = the requested member's per-person SUM of emails read over the
              window; median/p25/p75/range = the distribution of those per-person
              SUMs across the member's DEPARTMENT (same org_unit_id).

  Department: 5 Engineering members (alice, bob, carol, dave, erin), base rates
  r ∈ {10,20,30,40,50}, each seeded one read-row on the same day inside the queried
  window → per-person window SUM = r. The IC case requests erin (r=50), so value =
  50; the department of 5 yields the median/p25/p75/range below.
  Cases: custom scope (department of 5) · empty window.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_m365.email_activity:
    - { $ref: templates/m365_email.yaml#/templates/alice_email, reportRefreshDate: "2026-12-25", unique_key: read-alice-20261225, readCount: 10 }   # r=10
    - { $ref: templates/m365_email.yaml#/templates/alice_email, reportRefreshDate: "2026-12-25", unique_key: read-alice-20261225, readCount: 10 }   # duplicate → dedup to 10, not 20
    - { $ref: templates/m365_email.yaml#/templates/bob_email,   reportRefreshDate: "2026-12-25", unique_key: read-bob-20261225,   readCount: 20 }   # r=20
    - { $ref: templates/m365_email.yaml#/templates/carol_email, reportRefreshDate: "2026-12-25", unique_key: read-carol-20261225, readCount: 30 }   # r=30
    - { $ref: templates/m365_email.yaml#/templates/dave_email,  reportRefreshDate: "2026-12-25", unique_key: read-dave-20261225,  readCount: 40 }   # r=40
    - { $ref: templates/m365_email.yaml#/templates/erin_email,  reportRefreshDate: "2026-12-25", unique_key: read-erin-20261225,  readCount: 50 }   # r=50 (the requested IC member)

cases:
  - name: collab.emails_read
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2026-12-01", to: "2026-12-31" }
        metrics:
          - metric_key: collab.emails_read
            views:
              - { view: period }
              - { view: peer }
              - { view: timeseries, bucket: day }
              - { view: breakdown, dimensions: [tool] }
    expect:
      - assert: "status == 200"
      - metric: collab.emails_read
        view: period
        find: { entity_id: erin@example.com }
        equal: { value: 50 }
      - metric: collab.emails_read
        view: peer
        find: { entity_id: erin@example.com }
        equal: { target_value: 50, p25: 20, median: 30, p75: 40, min: 10, max: 50, n: 5 }
      - metric: collab.emails_read
        view: timeseries
        assert: "items.exists(s, s.entity_id == 'erin@example.com' && s.points.exists(p, p.bucket_start == '2026-12-25' && double(p.value) == 50.0))"
      - metric: collab.emails_read
        view: breakdown
        assert: "items.exists(v, v.entity_id == 'erin@example.com' && v.dimensions.exists(d, d.key == 'tool' && d.value == 'm365') && double(v.value) == 50.0)"

  - name: collab.emails_read empty window
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2026-01-01", to: "2026-01-31" }
        metrics: [{ metric_key: collab.emails_read, views: [{ view: period }] }]
    expect:
      - assert: "status == 200"
      - { metric: collab.emails_read, view: period, find: { entity_id: erin@example.com }, equal: { value: null } }
