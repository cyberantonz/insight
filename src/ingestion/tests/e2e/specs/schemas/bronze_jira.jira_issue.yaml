# Reusable JSON schema for the table (all real fields). Resolved by table name.
# Mirrors the bronze_jira.jira_issue placeholder DDL in
# scripts/create-bronze-placeholders.sh, which in turn mirrors the columns the
# Jira staging dbt models read (jira__issue_field_snapshot.sql).
schemas:
  bronze_jira.jira_issue:
    $schema: http://json-schema.org/draft-07/schema#
    type: object
    additionalProperties: false
    properties:
      id: { type: string }
      source_id: { type: string }
      jira_id: { type: string }
      unique_key: { type: string }
      id_readable: { type: string }
      issue_type: { type: string }
      created: { type: string }
      updated: { type: string }
      due_date: { type: string }
      parent_id: { type: string }
      project_key: { type: string }
      reporter_id: { type: [string, "null"] }
      custom_fields_json: { type: string }
      _airbyte_raw_id: { type: string }
      _airbyte_extracted_at: { type: string, format: date-time }
      _airbyte_meta: { type: string }
      _airbyte_generation_id: { type: integer }
