name: Build & Push Container Images

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/ingestion/**"
      - ".github/workflows/build-images.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/ingestion/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/cyberfabric

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ingestion: ${{ steps.filter.outputs.ingestion }}
      jira_enrich: ${{ steps.filter.outputs.jira_enrich }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
            ingestion:
              - 'src/ingestion/**'
            jira_enrich:
              - 'src/ingestion/connectors/task-tracking/jira/enrich/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: insight-api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - image: insight-analytics-api
            dockerfile: services/analytics-api/Dockerfile
          - image: insight-identity-resolution
            dockerfile: services/identity/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR only when we'll actually push (main pushes /
      # manual dispatches from main). On PRs — especially from forks —
      # the token has no `packages: write` and there's nothing to push,
      # so skip the login entirely.
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=raw,value={{date 'YYYY.MM.DD.HH.mm'}}-{{sha}},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      # PRs (including forks) build only — verifies the Dockerfile and the
      # build still works without polluting GHCR. Pushes happen only on
      # merges to main and on manual dispatches from main.
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/backend
          file: src/backend/${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  toolbox:
    needs: changes
    if: needs.changes.outputs.ingestion == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-toolbox
          tags: |
            type=raw,value={{date 'YYYY.MM.DD.HH.mm'}}-{{sha}},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build → validate → push. The build step loads the image into the
      # local Docker daemon so the validate step can `docker run` against it;
      # the push step reuses the buildx cache (essentially free). Without
      # the validate step a broken dbt project (duplicate model name,
      # broken `ref()`, jinja error, schema.yml mismatch) only manifests
      # at first CronWorkflow run in the cluster.
      - name: Build toolbox image (load locally)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/ingestion
          file: src/ingestion/tools/toolbox/Dockerfile
          load: true
          push: false
          tags: insight-toolbox:ci-validate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate dbt project (dbt parse)
        # `dbt parse` exercises the dbt manifest: duplicate model/test
        # names, broken `ref()`/`source()`, jinja syntax errors,
        # schema.yml model patches that don't match a model — all error
        # here. It does NOT execute any SQL against the warehouse: the
        # dummy profile below is never connected, the adapter just
        # needs to be loadable.
        run: |
          mkdir -p /tmp/dbt-ci-profiles
          cat > /tmp/dbt-ci-profiles/profiles.yml <<'YAML'
          ingestion:
            target: ci-parse
            outputs:
              ci-parse:
                type: clickhouse
                host: dummy.local
                port: 8123
                schema: dbt_parse_ci
                user: ci
                password: ci
                secure: false
          YAML
          docker run --rm \
            -v /tmp/dbt-ci-profiles:/profiles:ro \
            -w /ingestion/dbt \
            insight-toolbox:ci-validate \
            dbt parse --profiles-dir /profiles

      - name: Push toolbox image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/ingestion
          file: src/ingestion/tools/toolbox/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  jira-enrich:
    needs: changes
    if: needs.changes.outputs.jira_enrich == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-jira-enrich
          tags: |
            type=raw,value={{date 'YYYY.MM.DD.HH.mm'}}-{{sha}},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/ingestion/connectors/task-tracking/jira/enrich
          file: src/ingestion/connectors/task-tracking/jira/enrich/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
